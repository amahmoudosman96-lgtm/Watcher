name: CD

# Continuous delivery. Provider-neutral by design: build + publish a container
# image to GHCR on every push to main (and on version tags). The actual deploy
# target is a §17 open question ("a cloud account for hosting (AWS/Render)?") —
# the deploy job below is a gated placeholder until that's decided. Per AGENTS.md
# self-hosted constraint, nothing here introduces runtime external egress.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Build & publish API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f apps/api/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No apps/api/Dockerfile yet — skipping image build. Activates when the API is containerized."
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.detect.outputs.exists == 'true'

      - name: Log in to GHCR
        if: steps.detect.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        if: steps.detect.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: image
    runs-on: ubuntu-latest
    # Gated on the hosting decision (§17). Create a GitHub Environment named per
    # the chosen target and add its deploy credentials as secrets, then replace
    # this step. Until then the job no-ops rather than failing the pipeline.
    environment: ${{ vars.DEPLOY_ENVIRONMENT || '' }}
    steps:
      - name: Deploy (pending §17 hosting decision)
        run: |
          echo "::notice::No deploy target configured. Resolve §17 'cloud account for hosting'"
          echo "::notice::(AWS / Render / self-hosted), wire credentials, and replace this step."
